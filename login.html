<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postal Service Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

    <div class="form-box">

        <div class="form-toggle">
            <button type="button" id="loginBtn" class="active">Login</button>
            <button type="button" id="signupBtn">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">

            <h2>Welcome Back</h2>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>

            <div class="forgot-link">
                <a href="404.html">
                    <i class="fa-solid fa-key"></i>
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="submit-btn">
                Login
            </button>

            <p class="social-text">Login with</p>

            <div class="social-icons">
                <a href="404.html"><i class="fab fa-google"></i></a>
                <a href="404.html"><i class="fab fa-facebook-f"></i></a>
                <a href="404.html"><i class="fab fa-linkedin-in"></i></a>
            </div>

        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display:none;">

            <h2>Create Account</h2>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="signupName" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="signupPhone" placeholder="Phone Number" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="Password" required>
            </div>

            <button type="submit" class="submit-btn">
                Create Account
            </button>

            <div class="social-icons">
                <a href="404.html"><i class="fab fa-google"></i></a>
                <a href="404.html"><i class="fab fa-facebook-f"></i></a>
                <a href="404.html"><i class="fab fa-linkedin-in"></i></a>
            </div>

        </form>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
